{% extends 'base.html' %}
{% load static %}
{% block content %}

<!-- PRODUCTS SECTION -->
<section class="py-20 bg-gray-50">

    <div class="max-w-7xl mx-auto px-6">

        <!-- HEADER -->
        <div class="text-center mb-14">
            <h2 class="text-3xl md:text-4xl font-bold mb-4 uppercase">
                Products
            </h2>
            <p class="text-gray-500 max-w-xl mx-auto">
                Carefully selected fruits showcasing freshness, quality, and natural goodness.
            </p>
        </div>

        <!-- GRID -->
        <div class="grid md:grid-cols-3 sm:grid-cols-2 grid-cols-1 gap-10">


            {% for p in products %}

            <!-- CARD -->
            <a href="{% url 'contact' %}" class="group relative rounded-2xl overflow-hidden shadow-lg">

                <img src="{{ p.image.url }}" alt="{{ p.name }}"
                    class="w-full h-80 object-cover group-hover:scale-110 transition duration-500">

                <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent"></div>

                <div class="absolute bottom-0 p-6 text-white">
                    <h3 class="text-xl font-bold mb-2">{{ p.name }}</h3>

                </div>

            </a>

            {% endfor %}


        </div>

    </div>
</section>


{% endblock %}
